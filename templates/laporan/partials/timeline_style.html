{% comment %}
==========================================================================
   LAPORAN TIMELINE STYLE - Style Timeline Laporan
   Partial CSS style untuk timeline di halaman laporan.
   ==========================================================================
{% endcomment %}
<style>

.timeline {
    position: relative;
    padding: 0;
    list-style: none;
    margin: 0;
}

.timeline-item {
    position: relative;
    padding-left: 2rem;
    padding-bottom: 0.75rem;
}

.timeline-item-transparent {
    background: transparent !important;
}

.border-left-dashed {
    border-left: 2px solid #d9dee3 !important;
    margin-left: 0.5rem;
}

.timeline-item:last-child.border-left-dashed {
    border-left: none !important;
}

.timeline-point {
    position: absolute;
    left: 0;
    top: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 0.875rem;
    height: 0.875rem;
    background-color: #ffab00; 
    border-radius: 50%;
    border: none; 
    z-index: 1;
}

.timeline-point-primary { background-color: #696cff; }
.timeline-point-secondary { background-color: #8592a3; }
.timeline-point-success { background-color: #71dd37; }
.timeline-point-danger { background-color: #ff3e1d; }
.timeline-point-warning { background-color: #ffab00; }
.timeline-point-info { background-color: #03c3ec; }
.timeline-point-dark { background-color: #233446; }

.timeline-event {
    position: relative;
    width: 100%;
}

.timeline-header {
    display: none;
}

.timeline-title {
    font-size: 0.8125rem;
    font-weight: 500;
    color: #566a7f;
    margin-bottom: 0.125rem;
    line-height: 1.2;
}

.timeline-desc {
    font-size: 0.75rem;
    color: #697a8d;
    margin-bottom: 0.25rem;
    line-height: 1.3;
}

.timeline-user {
    font-size: 0.6875rem;
    color: #a1acb8;
    display: flex;
    align-items: center;
    gap: 0.25rem;
}

.timeline-user i {
    font-size: 0.75rem;
}

.changes-list {
    margin: 0.25rem 0 0 0;
    padding: 0;
    list-style: none;
}

.changes-list li {
    font-size: 0.75rem;
    color: #697a8d;
    margin-bottom: 0.125rem;
    line-height: 1.3;
    padding-left: 0.5rem;
    position: relative;
}

.changes-list li:before {
    content: "•";
    position: absolute;
    left: 0;
    color: #d9dee3;
}

.field-label {
    font-weight: 500;
    color: #566a7f;
    margin-right: 0.25rem;
}

.val-old {
    color: #ff3e1d;
    text-decoration: line-through;
    margin-right: 0.25rem;
    font-size: 0.6875rem;
}

.val-new {
    color: #03c3ec;
    font-weight: 500;
    font-size: 0.6875rem;
}

.arrow-icon {
    font-size: 0.625rem;
    color: #a1acb8;
    margin: 0 0.125rem;
}

.changes-box {
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
}

.timeline .text-muted {
    font-size: 0.6875rem;
    color: #a1acb8;
}
</style>
