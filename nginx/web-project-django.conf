upstream webapp {
    server web_project_django:5005;
}

server {
    listen 5050;
    server_name localhost;

    # Batas upload file (default Nginx 1MB terlalu kecil untuk upload foto/dokumen)
    client_max_body_size 20M;

    # Static files — dilayani langsung oleh Nginx (lebih cepat dari Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Media files (foto upload, dokumen, dll)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Semua request lainnya diteruskan ke Django/Gunicorn
    location / {
        proxy_pass http://webapp;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
